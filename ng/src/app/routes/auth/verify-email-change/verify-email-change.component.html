<div class="min-h-screen flex items-center justify-center bg-surface-dark px-6">
  <div class="w-full max-w-md bg-surface-card/5 border border-surface-card/10 rounded-2xl px-8 py-12 flex flex-col items-center gap-8 text-center">

    @if (status() === 'loading') {
      <div aria-live="polite" aria-busy="true" class="flex flex-col items-center gap-4">
        <span class="text-4xl" aria-hidden="true">⏳</span>
        <p class="text-white/70 text-base">E-Mail-Adresse wird bestätigt…</p>
      </div>
    }

    @if (status() === 'success') {
      <div role="status" aria-live="polite" class="flex flex-col items-center gap-4">
        <span class="text-5xl" aria-hidden="true">✅</span>
        <h1 class="text-2xl font-semibold text-white">E-Mail erfolgreich geändert</h1>
        <p class="text-white/70 text-sm leading-relaxed">{{ message() }}</p>
        <a
          routerLink="/protected/settings"
          class="mt-2 inline-block px-6 py-3 rounded-3xl bg-white text-gray-950 font-semibold text-sm hover:bg-white/90 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white">
          Zurück zu den Einstellungen
        </a>
      </div>
    }

    @if (status() === 'error') {
      <div role="alert" aria-live="assertive" class="flex flex-col items-center gap-4">
        <span class="text-5xl" aria-hidden="true">❌</span>
        <h1 class="text-2xl font-semibold text-white">Bestätigung fehlgeschlagen</h1>
        <p class="text-white/70 text-sm leading-relaxed">{{ message() }}</p>
        <a
          routerLink="/protected/settings"
          class="mt-2 inline-block px-6 py-3 rounded-3xl bg-white text-gray-950 font-semibold text-sm hover:bg-white/90 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white">
          Zurück zu den Einstellungen
        </a>
      </div>
    }

  </div>
</div>
