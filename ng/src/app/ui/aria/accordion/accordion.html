<div ngAccordionGroup class="basic-accordion" [multiExpandable]="false">
  @for (item of items(); track item.title; let i = $index) {
    <div class="accordion-item">
        <button class="w-full text-start py-2 px-3 bg-blue-100 border border-blue-300" ngAccordionTrigger [panelId]="'q' + i" [expanded]="$first">
          {{ item.title }}
        </button>
      <div class="text-start" ngAccordionPanel [panelId]="'q' + i">
        <ng-template ngAccordionContent>
          {{ item.content }}
        </ng-template>
      </div>
    </div>
  }
</div>
